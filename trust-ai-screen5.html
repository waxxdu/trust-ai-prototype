<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TRUST-AI – Bewertung</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  /* ── Accent / Color Tokens (theme-invariant) ── */
  :root {
    --accent: #6366f1; --accent2: #818cf8; --accent3: #4f46e5;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444; --orange: #f97316;
    --radius-sm: 8px; --radius-md: 12px; --transition: 150ms ease;
  }
  /* ── Light mode (default) ── */
  :root, [data-theme="light"] {
    --bg: #F6F7FA; --surface: #FFFFFF; --surface2: #F0F2F8; --surface3: #E8EBF4;
    --border: #D8DCF0; --border2: #B8BEDA;
    --text: #111827; --text2: #374151; --text3: #6B7280;
    --green-bg: rgba(34,197,94,0.10); --yellow-bg: rgba(234,179,8,0.10);
    --red-bg: rgba(239,68,68,0.10); --orange-bg: rgba(249,115,22,0.10);
    --shadow-card: 0 2px 16px rgba(0,0,0,0.07);
    --nav-bg: rgba(246,247,250,0.92);
  }
  /* ── Dark mode (auto + explicit) ── */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --surface3: #2a2f45;
      --border: #2e3350; --border2: #3d4468;
      --text: #e8eaf6; --text2: #9ba3c7; --text3: #5c6490;
      --green-bg: rgba(34,197,94,0.12); --yellow-bg: rgba(234,179,8,0.12);
      --red-bg: rgba(239,68,68,0.12); --orange-bg: rgba(249,115,22,0.12);
      --shadow-card: 0 2px 16px rgba(0,0,0,0.3);
      --nav-bg: rgba(15,17,23,0.92);
    }
  }
  [data-theme="dark"] {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --surface3: #2a2f45;
    --border: #2e3350; --border2: #3d4468;
    --text: #e8eaf6; --text2: #9ba3c7; --text3: #5c6490;
    --green-bg: rgba(34,197,94,0.12); --yellow-bg: rgba(234,179,8,0.12);
    --red-bg: rgba(239,68,68,0.12); --orange-bg: rgba(249,115,22,0.12);
    --shadow-card: 0 2px 16px rgba(0,0,0,0.3);
    --nav-bg: rgba(15,17,23,0.92);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 200;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 0 20px; height: 56px;
    display: flex; align-items: center; gap: 12px;
  }
  .topbar-logo { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent2); letter-spacing: 0.05em; flex-shrink: 0; }
  .topbar-sep { width: 1px; height: 20px; background: var(--border2); flex-shrink: 0; }
  .topbar-uc {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; gap: 1px;
  }
  .topbar-uc-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar-uc-meta { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; white-space: nowrap; }
  .topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .topbar-step-pill {
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2);
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 100px; padding: 3px 10px; white-space: nowrap;
  }
  .topbar-btn {
    padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: none; font-family: 'DM Sans', sans-serif;
  }
  .topbar-btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .topbar-btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  /* Mobile UC menu button (hamburger for sidebar) */
  .topbar-menu-btn {
    display: none; width: 34px; height: 34px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border); cursor: pointer;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .topbar-menu-btn svg { width: 16px; height: 16px; stroke: var(--text2); fill: none; stroke-width: 2; stroke-linecap: round; }
  @media (max-width: 900px) { .topbar-menu-btn { display: flex; } }

  /* ── LAYOUT ── */
  .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 56px); }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 20px; position: sticky; top: 56px;
    height: calc(100vh - 56px); overflow-y: auto;
  }
  @media (max-width: 900px) {
    .sidebar {
      display: none; position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
      z-index: 150; height: auto; border-right: none; border-bottom: 1px solid var(--border);
    }
    .sidebar.mobile-open { display: block; }
  }
  .sidebar-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 14px; }
  .uc-list { display: flex; flex-direction: column; gap: 5px; }
  .uc-list-item {
    padding: 9px 11px; border-radius: 9px; cursor: pointer;
    display: flex; align-items: center; gap: 9px;
    border: 1px solid transparent; transition: background 0.15s;
  }
  .uc-list-item:hover { background: var(--surface2); }
  .uc-list-item.active { background: var(--surface2); border-color: var(--border2); }
  .uc-list-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .uc-list-item.active .uc-list-dot { background: var(--accent2); }
  .uc-list-item.done-green .uc-list-dot { background: var(--green); }
  .uc-list-item.done-yellow .uc-list-dot { background: var(--yellow); }
  .uc-list-item.done-red .uc-list-dot { background: var(--red); }
  .uc-list-name { font-size: 12px; color: var(--text2); line-height: 1.4; flex: 1; }
  .uc-list-item.active .uc-list-name { color: var(--text); }
  .uc-list-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); flex-shrink: 0; }
  .uc-list-item.sofort-item { border-left: 2px solid var(--orange); padding-left: 9px; }
  .sidebar-progress { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .sp-bar { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .sp-fill { height: 100%; background: linear-gradient(90deg, var(--accent3), var(--accent2)); border-radius: 2px; transition: width 0.4s; }
  .sp-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

  /* ── MAIN ── */
  .main { padding: 28px 28px 100px; max-width: 720px; }
  @media (max-width: 600px) { .main { padding: 16px 16px 100px; } }

  /* ── WIZARD STEP HEADER ── */
  .wizard-header { margin-bottom: 24px; }
  .wizard-steps { display: flex; gap: 4px; margin-bottom: 10px; }
  .wstep { flex: 1; height: 3px; border-radius: 2px; background: var(--surface3); transition: background 0.3s; }
  .wstep.done { background: var(--accent3); opacity: 0.5; }
  .wstep.active { background: var(--accent2); }
  .wizard-step-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); }
  .wizard-step-label strong { color: var(--text2); }

  /* ── UC HEADER CARD ── */
  .uc-header-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; margin-bottom: 20px;
  }
  .uc-header-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 100px; font-size: 11px; font-weight: 500;
  }
  .tag-cat { background: var(--surface3); color: var(--text2); }
  .tag-sofort { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(249,115,22,0.3); }
  .tag-eth { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }
  .tag-reg { background: rgba(99,102,241,0.12); color: var(--accent2); border: 1px solid rgba(99,102,241,0.25); }
  .uc-header-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
  .uc-header-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* ── SECTION CARD ── */
  .section-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px; margin-bottom: 16px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .section-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--text3); margin-bottom: 18px;
  }

  /* ── QUESTIONS ── */
  .q-block { margin-bottom: 22px; }
  .q-block:last-child { margin-bottom: 0; }
  .q-text { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 5px; line-height: 1.5; }
  .q-hint { font-size: 12px; color: var(--text3); margin-bottom: 10px; }
  .q-options { display: flex; flex-direction: column; gap: 7px; }
  .q-opt {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 13px; border-radius: 9px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2);
    font-size: 13px; color: var(--text2); transition: all 0.15s; user-select: none;
  }
  .q-opt:hover { border-color: var(--border2); color: var(--text); }
  .q-opt.selected { border-color: var(--accent); background: rgba(99,102,241,0.08); color: var(--text); }
  .radio-circle {
    width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border2);
    flex-shrink: 0; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  }
  .radio-circle.checked { border-color: var(--accent); background: var(--accent); }
  .radio-circle.checked::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff; }
  .check-box {
    width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--border2);
    flex-shrink: 0; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  }
  .check-box.checked { border-color: var(--accent); background: var(--accent); }
  .check-box.checked::after { content: '✓'; font-size: 10px; color: #fff; font-weight: 700; }
  .q-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 13px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 13px; outline: none; transition: border-color 0.15s;
  }
  .q-input:focus { border-color: var(--accent); }
  .q-input::placeholder { color: var(--text3); }

  /* ── FLAGS ── */
  .flag-list { display: flex; flex-direction: column; gap: 10px; }
  .flag-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; border-radius: 10px;
    border: 1px solid; font-size: 13px;
  }
  .flag-item.red { background: var(--red-bg); border-color: rgba(239,68,68,0.3); }
  .flag-item.yellow { background: var(--yellow-bg); border-color: rgba(234,179,8,0.3); }
  .flag-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .flag-msg { font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .flag-action { font-size: 12px; color: var(--text2); }

  /* ── HITL ── */
  .hitl-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  @media (max-width: 560px) { .hitl-grid { grid-template-columns: 1fr; } }
  .hitl-opt {
    padding: 14px; border-radius: 11px; cursor: pointer; user-select: none;
    border: 1.5px solid var(--border); background: var(--surface2); transition: all 0.15s;
    text-align: center;
  }
  .hitl-opt:hover { border-color: var(--border2); }
  .hitl-opt.selected { border-color: var(--accent); background: rgba(99,102,241,0.08); }
  .hitl-opt.selected.level_1 { border-color: var(--green); background: var(--green-bg); }
  .hitl-opt.selected.level_2 { border-color: var(--yellow); background: var(--yellow-bg); }
  .hitl-opt.selected.level_3 { border-color: var(--orange); background: var(--orange-bg); }
  .hitl-opt.recommended { position: relative; }
  .hitl-opt.recommended::after {
    content: 'Empfohlen'; position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    font-size: 10px; font-weight: 600; background: var(--accent); color: #fff;
    padding: 1px 7px; border-radius: 100px; white-space: nowrap;
  }
  .hitl-icon { font-size: 20px; margin-bottom: 7px; }
  .hitl-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .hitl-desc { font-size: 11px; color: var(--text2); line-height: 1.4; }

  /* ── MEASURES ── */
  .measures-cat-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .measures-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 7px; margin-bottom: 16px; }
  .measure-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 12px; border-radius: 9px; cursor: pointer; user-select: none;
    border: 1px solid var(--border); background: var(--surface2); transition: all 0.15s;
  }
  .measure-item:hover { border-color: var(--border2); }
  .measure-item.selected { border-color: var(--accent); background: rgba(99,102,241,0.08); }
  .measure-item.required { border-color: rgba(234,179,8,0.5); background: var(--yellow-bg); cursor: default; }
  .measure-name { font-size: 12px; color: var(--text); }
  .measure-badge { font-size: 10px; color: var(--yellow); margin-left: auto; flex-shrink: 0; }

  /* ── BEST PRACTICES ── */
  .bp-list { display: flex; flex-direction: column; gap: 8px; }
  .bp-item {
    padding: 10px 14px; border-radius: 9px;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 13px; color: var(--text2); line-height: 1.5;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .bp-item::before { content: '→'; color: var(--accent2); flex-shrink: 0; font-family: 'DM Mono', monospace; }
  .bp-custom-wrap { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .bp-custom-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
  .bp-custom-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 13px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    resize: vertical; min-height: 72px; outline: none; transition: border-color 0.15s;
  }
  .bp-custom-input:focus { border-color: var(--accent); }
  .bp-custom-input::placeholder { color: var(--text3); }

  /* ── RESULT ── */
  .ai-result-box {
    padding: 12px 16px; border-radius: 10px; font-size: 13px; line-height: 1.6;
    margin-bottom: 16px; border: 1px solid;
  }
  .ai-result-box.green { background: var(--green-bg); border-color: rgba(34,197,94,0.3); color: var(--green); }
  .ai-result-box.yellow { background: var(--yellow-bg); border-color: rgba(234,179,8,0.3); color: var(--yellow); }
  .ai-result-box.red { background: var(--red-bg); border-color: rgba(239,68,68,0.3); color: var(--red); }
  .ampel-wrap { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
  @media (max-width: 480px) { .ampel-wrap { grid-template-columns: repeat(2,1fr); } }
  .ampel-btn {
    padding: 12px 8px; border-radius: 10px; cursor: pointer; text-align: center;
    border: 1.5px solid var(--border); background: var(--surface2); transition: all 0.15s; user-select: none;
  }
  .ampel-btn:hover { border-color: var(--border2); }
  .ampel-btn.selected.green { border-color: var(--green); background: var(--green-bg); }
  .ampel-btn.selected.yellow { border-color: var(--yellow); background: var(--yellow-bg); }
  .ampel-btn.selected.red { border-color: var(--red); background: var(--red-bg); }
  .ampel-btn.selected.deferred { border-color: var(--border2); background: var(--surface3); }
  .ampel-icon { font-size: 20px; margin-bottom: 5px; }
  .ampel-label { font-size: 11px; color: var(--text2); font-weight: 500; }
  .consequence-box {
    margin-top: 14px; padding: 13px 15px; border-radius: 10px;
    background: var(--red-bg); border: 1px solid rgba(239,68,68,0.25);
  }
  .consequence-box h4 { font-size: 13px; color: var(--red); margin-bottom: 8px; }
  .consequence-item { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .notes-area {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 13px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    resize: vertical; min-height: 80px; outline: none; transition: border-color 0.15s;
  }
  .notes-area:focus { border-color: var(--accent); }
  .notes-area::placeholder { color: var(--text3); }
  .override-note { padding: 13px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); margin-top: 14px; }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--bg); border-top: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .bb-left { display: flex; align-items: center; gap: 10px; }
  .bb-btn {
    padding: 9px 18px; border-radius: 9px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .bb-btn-primary { background: var(--accent); color: #fff; }
  .bb-btn-primary:hover { background: var(--accent3); }
  .bb-btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .bb-btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .bb-btn-ghost:hover { color: var(--text); border-color: var(--border2); }
  .bb-step-dots { display: flex; gap: 5px; }
  .bb-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--surface3); transition: background 0.2s; }
  .bb-dot.done { background: var(--accent3); opacity: 0.5; }
  .bb-dot.active { background: var(--accent2); }

  /* ── COMPLETION SCREEN ── */
  .completion-screen {
    display: none; min-height: calc(100vh - 56px);
    align-items: center; justify-content: center; padding: 40px 20px;
  }
  .completion-screen.active { display: flex; }
  .completion-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px; max-width: 500px; width: 100%; text-align: center;
  }
  .completion-icon { font-size: 48px; margin-bottom: 16px; }
  .completion-title { font-size: 24px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; }
  .completion-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; }
  .completion-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 28px; }
  .completion-stat { background: var(--surface2); border-radius: 10px; padding: 14px 8px; }
  .completion-stat-num { font-size: 28px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; margin-bottom: 4px; }
  .completion-stat-num.green { color: var(--green); }
  .completion-stat-num.yellow { color: var(--yellow); }
  .completion-stat-num.red { color: var(--red); }
  .completion-stat-label { font-size: 11px; color: var(--text3); }

  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <button class="topbar-menu-btn" id="menuBtn" onclick="toggleMobileMenu()">
    <svg viewBox="0 0 24 24"><line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="16" x2="21" y2="16"/></svg>
  </button>
  <a href="trust-ai-screen7.html" class="topbar-logo" style="text-decoration:none;color:inherit;cursor:pointer;">TRUST-AI</a>
  <div class="topbar-sep"></div>
  <a href="trust-ai-screen4.html" style="font-size:12px;color:var(--text3);text-decoration:none;flex-shrink:0;display:flex;align-items:center;gap:4px;" title="Zurück zur Shortlist">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    <span style="display:none;" class="topbar-back-label">Shortlist</span>
  </a>

let shortlist = [];

let currentFlags = [];

let currentWizardStep = 0; // index into activeSteps
let currentBpCustom = {}; // projektspezifische Best-Practice-Notizen je UC

function getActiveSteps() {
  return STEP_DEFS.filter(s => {
    if (s.alwaysShow) return true;
    if (s.isResultStep) return true;
    if (s.condition) return s.condition();
    return false;
  });
}

function loadData() {
  try {
    const proj = JSON.parse(localStorage.getItem('trust_ai_project') || '{}');
    shortlist = proj.shortlist || [];
    if (!shortlist.length) {
      shortlist = [
        { use_case_id:"UC-02", priority:1, status:"pending", sofort:false },
        { use_case_id:"UC-01", priority:2, status:"pending", sofort:false },
        { use_case_id:"UC-15", priority:3, status:"pending", sofort:false },
        { use_case_id:"UC-10", priority:4, status:"pending", sofort:true },
        { use_case_id:"UC-04", priority:5, status:"pending", sofort:false }
      ];
    }
    assessments = proj.assessments_map || {};
  } catch(e) {
    shortlist = [
      { use_case_id:"UC-02", priority:1, status:"pending", sofort:false },
      { use_case_id:"UC-01", priority:2, status:"pending", sofort:false },
      { use_case_id:"UC-15", priority:3, status:"pending", sofort:false }
    ];
    assessments = {};
  }
  shortlist.sort((a,b) => {
    if (a.sofort && !b.sofort) return -1;
    if (!a.sofort && b.sofort) return 1;
    return (a.priority||0) - (b.priority||0);
  });
}

// Map screen1 industry chip values → screen5 q_regulated_industry values
const INDUSTRY_TO_REGULATION = {
  pharma: 'pharma',
  finance: 'finance',
  energy: 'energy',
  medical: 'medical_devices',
  automotive: 'automotive',
  defense: 'defense',
  public: 'gdpr'
};

function getIndustryPrefill() {
  try {
    const proj = JSON.parse(localStorage.getItem('trust_ai_project') || '{}');
    const industries = proj.industry || [];
    if (industries.includes('none') || !industries.length) return [];
    return industries.map(i => INDUSTRY_TO_REGULATION[i]).filter(Boolean);
  } catch(e) { return []; }
}

function resetCurrentState() {
  const ucId = shortlist[currentIdx].use_case_id;
  const uc = ALL_UCS[ucId];
  currentAnswers = {};
  currentFlags = [];
  currentHITL = uc ? uc.hitl_default : 'level_1';
  currentMeasures = new Set(UC_SUGGESTED_MEASURES[ucId] || []);
  currentAmpel = null;
  currentNotes = '';
  currentWizardStep = 0;

  // Pre-fill regulated industry from project setup (Screen 1)
  const industryPrefill = getIndustryPrefill();
  if (industryPrefill.length) {
    currentAnswers['q_regulated_industry'] = industryPrefill;
  }

  if (assessments[ucId]) {
    const a = assessments[ucId];
    currentAnswers = JSON.parse(JSON.stringify(a.answers || {}));
    currentFlags = a.flags || [];
    currentHITL = a.hitl_level || currentHITL;
    currentMeasures = new Set(a.selected_measures || []);
    currentAmpel = a.result || null;
    currentNotes = a.notes || '';
    if (a.bp_custom) currentBpCustom[ucId] = a.bp_custom;
  }
  computeFlags();
  updateMeasuresFromFlags();
}

// ════════════════════════════════════════════════
// FLAG & MEASURE LOGIC
// ════════════════════════════════════════════════

function computeFlags() {
  const newFlags = new Set();
  STEP_DEFS.forEach(step => {
    if (!step.questions) return;
    step.questions.forEach(q => {
      if (q.type === 'single') {
        const val = currentAnswers[q.id];
        const opt = (q.options || []).find(o => o.value === val);
        if (opt?.flag) newFlags.add(opt.flag);
      } else if (q.type === 'multi') {
        const arr = currentAnswers[q.id] || [];
        arr.forEach(v => {
          const opt = (q.options || []).find(o => o.value === v);
          if (opt?.flag) newFlags.add(opt.flag);
        });
      }
    });
  });
  currentFlags = [...newFlags];
}

function updateMeasuresFromFlags() {
  // Auto-add required measures based on flags (they become required, can't be deselected)
  const ucId = shortlist[currentIdx].use_case_id;
  const suggested = new Set(UC_SUGGESTED_MEASURES[ucId] || []);
  MEASURES.forEach(m => {
    if (m.flags && m.flags.some(f => currentFlags.includes(f))) {
      currentMeasures.add(m.id);
    }
  });
}

function isRequiredMeasure(m) {
  return m.flags && m.flags.some(f => currentFlags.includes(f));
}

function computeSuggestedResult() {
  const redFlags = currentFlags.filter(f => FLAGS[f]?.severity === 'red');
  const yellowFlags = currentFlags.filter(f => FLAGS[f]?.severity === 'yellow');
  if (redFlags.length > 0) return 'red';
  if (yellowFlags.length > 0) return 'yellow';
  const answeredCount = Object.keys(currentAnswers).length;
  if (answeredCount >= 3) return 'green';
  return null;
}

function renderTopbar() {

  document.getElementById('topbarUcName').textContent = uc ? uc.title : ucId;
  const total = shortlist.length;
  document.getElementById('topbarUcMeta').textContent = `UC ${currentIdx + 1} von ${total}`;
  const activeSteps = getActiveSteps();
  document.getElementById('topbarStepPill').textContent = `Schritt ${currentWizardStep + 1}/${activeSteps.length}`;
}

function renderSidebar() {
  const list = document.getElementById('ucList');
  list.innerHTML = shortlist.map((item, i) => {
    const uc = ALL_UCS[item.use_case_id];
    const a = assessments[item.use_case_id];
    const resultClass = a ? `done-${a.result}` : '';
    return `<div class="uc-list-item ${resultClass} ${item.sofort?'sofort-item':''} ${i===currentIdx?'active':''}" onclick="jumpToUC(${i})">
      <div class="uc-list-dot"></div>
      <div class="uc-list-name">${uc ? uc.title : item.use_case_id}</div>
      <div class="uc-list-num">${i+1}</div>
    </div>`;
  }).join('');

  const total = shortlist.length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('spFill').style.width = pct + '%';
  document.getElementById('spLabel').textContent = `${done} von ${total} bewertet`;
}

function renderWizardHeader() {
  const activeSteps = getActiveSteps();
  const stepsHtml = activeSteps.map((s, i) =>
    `<div class="wstep ${i < currentWizardStep ? 'done' : i === currentWizardStep ? 'active' : ''}"></div>`
  ).join('');
  document.getElementById('wizardSteps').innerHTML = stepsHtml;
  const cur = activeSteps[currentWizardStep];
  document.getElementById('wizardStepLabel').innerHTML =
    `<strong>${cur?.label || ''}</strong> · Schritt ${currentWizardStep+1} von ${activeSteps.length}`;
}

function renderUCHeader() {
  const ucId = shortlist[currentIdx].use_case_id;
  const item = shortlist[currentIdx];
  const uc = ALL_UCS[ucId];
  if (!uc) return;
  document.getElementById('ucMeta').innerHTML =
    `<span class="tag tag-cat">${uc.category}</span>` +
    (item.sofort ? `<span class="tag tag-sofort">⚡ Sofort</span>` : '') +
    (uc.ethical ? `<span class="tag tag-eth">⚠ Ethik</span>` : '') +
    (uc.regulated ? `<span class="tag tag-reg">§ Reguliert</span>` : '');
  document.getElementById('ucTitle').textContent = uc.title;
  document.getElementById('ucDesc').textContent = uc.desc;
}

function renderStepContent() {
  const activeSteps = getActiveSteps();
  const step = activeSteps[currentWizardStep];
  if (!step) return;
  const el = document.getElementById('stepContent');

  if (step.isResultStep) {
    el.innerHTML = renderResultStep();
  } else {
    let html = `<div class="section-card"><div class="section-title">${step.label}</div>`;
    const visibleQs = (step.questions || []).filter(q => !q.condition || q.condition());
    visibleQs.forEach(q => { html += renderQuestion(q); });
    html += `</div>`;

    // Flags (if any computed)
    if (currentFlags.length > 0) {
      html += `<div class="section-card"><div class="section-title">⚑ Hinweise & Flags</div><div class="flag-list">`;
      currentFlags.forEach(fid => {
        const f = FLAGS[fid]; if (!f) return;
        const icon = f.severity === 'red' ? '🔴' : '🟡';
        html += `<div class="flag-item ${f.severity}"><div class="flag-icon">${icon}</div><div><div class="flag-msg">${f.msg}</div><div class="flag-action">→ ${f.action}</div></div></div>`;
      });
      html += `</div></div>`;
    }
    el.innerHTML = html;
  }
}

function renderQuestion(q) {
  let html = `<div class="q-block"><div class="q-text">${q.text}</div>`;
  if (q.hint) html += `<div class="q-hint">${q.hint}</div>`;
  html += `<div class="q-options">`;
  if (q.type === 'single') {
    html += q.options.map(o => {
      const sel = currentAnswers[q.id] === o.value;
      return `<div class="q-opt${sel?' selected':''}" onclick="selectSingle('${q.id}','${o.value}',${o.flag?`'${o.flag}'`:'null'})">
        <div class="radio-circle${sel?' checked':''}"></div>${o.label}
      </div>`;
    }).join('');
  } else if (q.type === 'multi') {
    html += q.options.map(o => {
      const arr = currentAnswers[q.id] || [];
      const sel = arr.includes(o.value);
      return `<div class="q-opt${sel?' selected':''}" onclick="toggleMulti('${q.id}','${o.value}',${o.flag?`'${o.flag}'`:'null'})">
        <div class="check-box${sel?' checked':''}"></div>${o.label}
      </div>`;
    }).join('');
  } else if (q.type === 'text') {
    const val = currentAnswers[q.id] || '';
    html += `</div><input type="text" class="q-input" placeholder="${q.placeholder||''}" value="${val}" oninput="updateText('${q.id}',this.value)">`;
    return html + `</div>`;
  }
  html += `</div></div>`;
  return html;
}

function renderResultStep() {
  const ucId = shortlist[currentIdx].use_case_id;
  const uc = ALL_UCS[ucId];
  const suggested = computeSuggestedResult();
  const levels = [
    { id:'level_1', icon:'🛡️', label:'Volle Kontrolle', desc:'Mensch prüft jedes Ergebnis und entscheidet.' },
    { id:'level_2', icon:'👁️', label:'Überwachte Autonomie', desc:'Mensch überwacht, prüft stichprobenartig.' },
    { id:'level_3', icon:'🤖', label:'Kontrollierte Automatisierung', desc:'KI handelt eigenständig in Grenzen.' }
  ];

  // Compute flag-required + suggested measures
  const ucSuggested = new Set(UC_SUGGESTED_MEASURES[ucId] || []);
  const flagRequired = new Set(MEASURES.filter(m => isRequiredMeasure(m)).map(m => m.id));

  let html = '';

  // HITL
  html += `<div class="section-card"><div class="section-title">Human-in-the-Loop (HITL)</div>
    <div class="hitl-grid">
      ${levels.map(l => {
        const isRec = uc && uc.hitl_default === l.id;
        const isSel = currentHITL === l.id;
        return `<div class="hitl-opt ${isSel ? 'selected '+l.id : ''} ${isRec ? 'recommended' : ''}" onclick="selectHITL('${l.id}')">
          <div class="hitl-icon">${l.icon}</div>
          <div class="hitl-label">${l.label}</div>
          <div class="hitl-desc">${l.desc}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // Measures – grouped, with required/suggested highlighting
  const catLabels = { hitl:'Human-in-the-Loop', org:'Organisatorisch', tech:'Technisch', legal:'Rechtlich' };
  const cats = ['hitl','org','tech','legal'];
  // Only show legal cat if there are flag-required or suggested measures in it
  html += `<div class="section-card"><div class="section-title">Maßnahmen</div>`;
  cats.forEach(cat => {
    const ms = MEASURES.filter(m => m.cat === cat);
    // Filter: show measure if it's required by flags, suggested for UC, or in currentMeasures
    const relevantMs = ms.filter(m => flagRequired.has(m.id) || ucSuggested.has(m.id) || currentMeasures.has(m.id));
    // For legal/tech: only show if relevant
    const showAll = cat === 'hitl' || cat === 'org';
    const displayMs = showAll ? ms : relevantMs;
    if (!displayMs.length) return;
    html += `<div class="measures-cat-label">${catLabels[cat]}</div><div class="measures-grid">`;
    displayMs.forEach(m => {
      const isSel = currentMeasures.has(m.id);
      const isReq = flagRequired.has(m.id);
      const isSug = ucSuggested.has(m.id) && !isReq;
      html += `<div class="measure-item${isSel?' selected':''}${isReq?' required':''}" onclick="${isReq?'':` toggleMeasure('${m.id}') `}">
        <div class="check-box${isSel?' checked':''}"></div>
        <div class="measure-name">${m.label}</div>
        ${isReq ? `<span class="measure-badge" title="Aufgrund von Flags erforderlich">!</span>` : isSug ? `<span class="measure-badge" title="Empfohlen für diesen Use Case">⭐</span>` : ''}
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  // Best Practices – filtered by relevance (flags + UC)
  const allBPs = UC_BEST_PRACTICES[ucId] || [];
  if (allBPs.length) {
    html += `<div class="section-card"><div class="section-title">Best Practices</div><div class="bp-list">`;
    allBPs.forEach(bp => { html += `<div class="bp-item">${bp}</div>`; });
    html += `</div>
    <div class="bp-custom-wrap">
      <div class="bp-custom-label">Projektspezifischer Hinweis <span style="color:var(--text3);font-weight:400;">(optional)</span></div>
      <textarea class="bp-custom-input" id="bp-custom-${ucId}" placeholder="Eigene Ergänzungen, Einschränkungen oder Hinweise für euer Projekt…" oninput="saveBpCustom('${ucId}',this.value)">${currentBpCustom[ucId]||''}</textarea>
    </div>
    </div>`;
  }

  // Result
  let aiText = '';
  if (suggested === 'red') aiText = `🔴 Rote Flags vorhanden. Dieser Use Case sollte erst nach Klärung aller offenen Punkte umgesetzt werden.`;
  else if (suggested === 'yellow') aiText = `🟡 Gelbe Hinweise vorhanden. Einsatz möglich, aber mit Auflagen.`;
  else if (suggested === 'green') aiText = `🟢 Keine kritischen Flags. Der Use Case kann umgesetzt werden.`;

  html += `<div class="section-card"><div class="section-title">Bewertungsergebnis</div>
    ${aiText ? `<div class="ai-result-box ${suggested}" style="margin-bottom:16px;">${aiText}</div>` : ''}
    <div class="ampel-wrap">
      ${['green','yellow','red','deferred'].map(c => {
        const icons = { green:'🟢', yellow:'🟡', red:'🔴', deferred:'⏸️' };
        const labels = { green:'Freigegeben', yellow:'Bedingt freigegeben', red:'Abgelehnt', deferred:'Zurückgestellt' };
        return `<div class="ampel-btn ${c}${currentAmpel===c?' selected':''}" onclick="selectAmpel('${c}')">
          <div class="ampel-icon">${icons[c]}</div>
          <div class="ampel-label">${labels[c]}</div>
        </div>`;
      }).join('')}
    </div>
    ${currentAmpel && currentAmpel !== suggested ? `<div class="override-note" style="margin-top:14px;">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px;">Du weichst von der Empfehlung ab. Bitte begründe kurz:</div>
      <textarea class="notes-area" placeholder="Begründung..." oninput="currentNotes=this.value">${''}</textarea>
    </div>` : ''}
    ${currentAmpel === 'red' && uc.consequence ? `<div class="consequence-box" style="margin-top:14px;">
      <h4>⚠ Konsequenz bei Ablehnung</h4>
      <div class="consequence-item">Aufwand-Impact: ${uc.consequence.effort}</div>
      <div class="consequence-item">Qualitäts-Impact: ${uc.consequence.quality}</div>
    </div>` : ''}
  </div>`;

  html += `<div class="section-card"><div class="section-title">Notizen</div>
    <textarea class="notes-area" placeholder="Optionale Notizen..." oninput="currentNotes=this.value">${currentNotes}</textarea>
  </div>`;

  return html;
}

function renderBottomBar() {
  const activeSteps = getActiveSteps();
  const isFirst = currentWizardStep === 0;
  const isLast = currentWizardStep === activeSteps.length - 1;
  document.getElementById('btnBack').disabled = isFirst;
  const btnNext = document.getElementById('btnNext');
  if (isLast) {
    btnNext.textContent = currentIdx >= shortlist.length - 1 ? 'Abschließen ✓' : 'Nächster Use Case →';
    btnNext.disabled = currentAmpel === null;
  } else {
    btnNext.textContent = 'Weiter →';
    btnNext.disabled = false;
  }
  const dots = activeSteps.map((s, i) =>
    `<div class="bb-dot ${i < currentWizardStep ? 'done' : i === currentWizardStep ? 'active' : ''}"></div>`
  ).join('');
  document.getElementById('bbDots').innerHTML = dots;
}

// ════════════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════════════

function selectSingle(qid, val) {
  currentAnswers[qid] = val;
  computeFlags();
  updateMeasuresFromFlags();
  rerender();
}

function toggleMulti(qid, val) {
  if (!currentAnswers[qid]) currentAnswers[qid] = [];
  const arr = currentAnswers[qid];
  const idx = arr.indexOf(val);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(val);
  // Handle exclusive "none"
  if (val === 'none' && idx < 0) currentAnswers[qid] = ['none'];
  else if (val !== 'none') currentAnswers[qid] = arr.filter(v => v !== 'none');
  computeFlags();
  updateMeasuresFromFlags();
  rerender();
}

function updateText(qid, val) {
  currentAnswers[qid] = val;
  renderBottomBar();
}

function selectHITL(level) {
  currentHITL = level;
  rerender();
}

function toggleMeasure(id) {
  if (isRequiredMeasure(MEASURES.find(m => m.id === id))) return;
  if (currentMeasures.has(id)) currentMeasures.delete(id);
  else currentMeasures.add(id);
  rerender();
}

function selectAmpel(val) {
  currentAmpel = val;
  rerender();
}

function rerender() {
  renderWizardHeader();
  renderStepContent();
  renderBottomBar();
  renderTopbar();
}

function nextStep() {
  const activeSteps = getActiveSteps();
  if (currentWizardStep < activeSteps.length - 1) {
    currentWizardStep++;
    rerender();
    window.scrollTo(0, 0);
  } else {
    saveCurrentAssessment();
    if (currentIdx >= shortlist.length - 1) {
      showCompletion();
    } else {
      currentIdx++;
      resetCurrentState();
      renderUCHeader();
      render();
      window.scrollTo(0, 0);
    }
  }
}

function prevStep() {
  if (currentWizardStep > 0) {
    currentWizardStep--;
    rerender();
    window.scrollTo(0, 0);
  }
}

function jumpToUC(idx) {
  if (idx === currentIdx) {
    // Close mobile menu if open
    document.getElementById('sidebar').classList.remove('mobile-open');
    return;
  }
  saveCurrentAssessment();
  currentIdx = idx;
  resetCurrentState();
  renderUCHeader();
  render();
  window.scrollTo(0, 0);
  document.getElementById('sidebar').classList.remove('mobile-open');
}

function deferCurrentUC() {
  const ucId = shortlist[currentIdx].use_case_id;
  assessments[ucId] = {
    use_case_id: ucId, answers: { ...currentAnswers }, flags: [...currentFlags],
    result: 'deferred', hitl_level: currentHITL,
    selected_measures: [...currentMeasures], notes: 'Zurückgestellt',
    assessed_at: new Date().toISOString()
  };
  const slItem = shortlist.find(s => s.use_case_id === ucId);
  if (slItem) slItem.status = 'deferred';
  persistAssessments();
  if (currentIdx < shortlist.length - 1) {
    currentIdx++;
    resetCurrentState();
    renderUCHeader();
    render();
    window.scrollTo(0, 0);
  } else {
    showCompletion();
  }
}

function toggleMobileMenu() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}

function saveBpCustom(ucId, value) {
  currentBpCustom[ucId] = value;
}

function saveCurrentAssessment() {
  const ucId = shortlist[currentIdx].use_case_id;
  assessments[ucId] = {
    use_case_id: ucId, answers: JSON.parse(JSON.stringify(currentAnswers)), flags: [...currentFlags],
    result: currentAmpel || computeSuggestedResult() || 'yellow',
    hitl_level: currentHITL, selected_measures: [...currentMeasures],
    notes: currentNotes, bp_custom: currentBpCustom[ucId] || '',
    assessed_at: new Date().toISOString()
  };
  const slItem = shortlist.find(s => s.use_case_id === ucId);
  if (slItem) slItem.status = assessments[ucId].result;
  persistAssessments();
}

function persistAssessments() {
  try {
    const proj = JSON.parse(localStorage.getItem('trust_ai_project') || '{}');
    proj.assessments_map = assessments;
    proj.shortlist = shortlist;
    proj.status = 'assessment';
    localStorage.setItem('trust_ai_project', JSON.stringify(proj));
  } catch(e) {}
}

function showCompletion() {
  document.getElementById('mainLayout').style.display = 'none';
  document.getElementById('bottomBar').style.display = 'none';
  document.getElementById('completionScreen').classList.add('active');
  const counts = { green:0, yellow:0, red:0, deferred:0 };
  Object.values(assessments).forEach(a => { if (counts[a.result] !== undefined) counts[a.result]++; });
  document.getElementById('completionStats').innerHTML = `
    <div class="completion-stat"><div class="completion-stat-num green">${counts.green}</div><div class="completion-stat-label">Freigegeben</div></div>
    <div class="completion-stat"><div class="completion-stat-num yellow">${counts.yellow}</div><div class="completion-stat-label">Mit Auflagen</div></div>
    <div class="completion-stat"><div class="completion-stat-num red">${counts.red}</div><div class="completion-stat-label">Abgelehnt</div></div>
    <div class="completion-stat"><div class="completion-stat-num" style="color:var(--text2)">${counts.deferred}</div><div class="completion-stat-label">Zurückgestellt</div></div>`;
  try {
    const proj = JSON.parse(localStorage.getItem('trust_ai_project') || '{}');
    proj.assessments_map = assessments; proj.shortlist = shortlist; proj.status = 'manifest';
    localStorage.setItem('trust_ai_project', JSON.stringify(proj));
  } catch(e) {}
}

function goToManifest() { window.location.href = 'trust-ai-screen6.html'; }

// ════════════════════════════════════════════════
// RESUME: start at first unassessed UC
// ════════════════════════════════════════════════
function findStartIndex() {
  const firstUnassessed = shortlist.findIndex(s => !assessments[s.use_case_id]);
  return firstUnassessed >= 0 ? firstUnassessed : Math.max(0, shortlist.length - 1);
}

// ── Theme ──
function applyThemeFromStorage() {
  const saved = localStorage.getItem('trust_ai_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = theme === 'dark' ? '🌙' : '☀️';
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = next === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('trust_ai_theme', next);
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
applyThemeFromStorage();
loadData();
currentIdx = findStartIndex();
resetCurrentState();
renderUCHeader();
render();
</script>

</html>
