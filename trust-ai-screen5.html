<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRUST-AI – Bewertung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --surface3: #2a2f45;
    --border: #2e3350;
    --border2: #3d4468;
    --text: #e8eaf6;
    --text2: #9ba3c7;
    --text3: #5c6490;
    --accent: #6366f1;
    --accent2: #818cf8;
    --accent3: #4f46e5;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --orange: #f97316;
    --orange-bg: rgba(249,115,22,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* TOP NAV */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .theme-btn-5 { background:transparent; border:1px solid var(--border); border-radius:8px; width:30px; height:30px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; color:var(--text2); flex-shrink:0; }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent2); letter-spacing: 0.05em; }
  .sep { color: var(--border2); }
  .uc-badge { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .progress-wrap { flex: 1; max-width: 240px; }
  .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent3), var(--accent2)); border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { font-size: 11px; color: var(--text3); margin-top: 5px; font-family: 'DM Mono', monospace; }
  .btn-sm { padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent3); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 57px); }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .sidebar { display: none; } }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px;
    position: sticky; top: 57px;
    height: calc(100vh - 57px);
    overflow-y: auto;
  }
  .sidebar-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 16px; }
  .uc-list { display: flex; flex-direction: column; gap: 6px; }
  .uc-list-item {
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .uc-list-item:hover { background: var(--surface2); }
  .uc-list-item.active { background: var(--surface2); border-color: var(--border2); }
  .uc-list-item.done-green .uc-list-dot { background: var(--green); }
  .uc-list-item.done-yellow .uc-list-dot { background: var(--yellow); }
  .uc-list-item.done-red .uc-list-dot { background: var(--red); }
  .uc-list-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .uc-list-item.active .uc-list-dot { background: var(--accent2); }
  .uc-list-name { font-size: 13px; color: var(--text2); line-height: 1.4; }
  .uc-list-item.active .uc-list-name { color: var(--text); }
  .uc-list-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); margin-left: auto; flex-shrink: 0; }
  .uc-list-item.sofort-item { border-left: 2px solid var(--orange); padding-left: 10px; }

  /* MAIN */
  .main { padding: 32px; max-width: 800px; }
  @media (max-width: 600px) { .main { padding: 16px; } }

  /* UC HEADER */
  .uc-header { margin-bottom: 28px; }
  .uc-header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 10px; }
  .uc-title { font-size: 22px; font-weight: 700; line-height: 1.3; }
  .uc-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
  .tag-cat { background: rgba(99,102,241,0.15); color: var(--accent2); }
  .tag-eth { background: rgba(249,115,22,0.15); color: var(--orange); }
  .tag-reg { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .tag-sofort { background: rgba(249,115,22,0.15); color: var(--orange); }
  .uc-desc { font-size: 14px; color: var(--text2); line-height: 1.6; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }

  /* SECTIONS */
  .section { margin-bottom: 28px; }
  .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; cursor:pointer; }
  .section-title:hover { color: var(--accent2); }
  .section-title::after { content:''; flex: 1; height: 1px; background: var(--border); }
  .section-title[data-anchor] { scroll-margin-top: 80px; }

  /* QUESTIONS */
  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .q-text { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .q-hint { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
  .q-options { display: flex; flex-direction: column; gap: 7px; }
  .q-opt {
    display: flex; align-items: flex-start; gap: 11px; padding: 10px 13px;
    border-radius: 10px; border: 1px solid var(--border); cursor: pointer;
    transition: all 0.15s; font-size: 14px; color: var(--text2);
  }
  .q-opt:hover { border-color: var(--accent); color: var(--text); background: rgba(99,102,241,0.05); }
  .q-opt.selected { border-color: var(--accent); background: rgba(99,102,241,0.1); color: var(--text); }
  .q-opt.selected .radio-circle { border-color: var(--accent); background: var(--accent); }
  .q-opt-multi.selected { border-color: var(--accent2); background: rgba(99,102,241,0.1); color: var(--text); }
  .radio-circle { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border2); flex-shrink: 0; margin-top: 1px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .radio-circle.checked { border-color: var(--accent2); background: var(--accent2); }
  .radio-circle.checked::after { content:'✓'; font-size: 10px; color: #fff; }
  .check-box { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--border2); flex-shrink: 0; margin-top: 1px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .check-box.checked { border-color: var(--accent2); background: var(--accent2); }
  .check-box.checked::after { content:'✓'; font-size: 10px; color: #fff; }
  .q-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 13px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border 0.15s; }
  .q-input:focus { border-color: var(--accent); }
  .q-input::placeholder { color: var(--text3); }

  /* FLAGS */
  .flag-list { display: flex; flex-direction: column; gap: 8px; }
  .flag-item { display: flex; gap: 12px; padding: 12px 14px; border-radius: 10px; border: 1px solid; }
  .flag-item.yellow { border-color: rgba(234,179,8,0.3); background: var(--yellow-bg); }
  .flag-item.red { border-color: rgba(239,68,68,0.3); background: var(--red-bg); }
  .flag-item.blue { border-color: rgba(99,102,241,0.3); background: rgba(99,102,241,0.08); }
  .flag-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .flag-msg { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .flag-item.yellow .flag-msg { color: var(--yellow); }
  .flag-item.red .flag-msg { color: var(--red); }
  .flag-item.blue .flag-msg { color: var(--accent2); }
  .flag-action { font-size: 12px; color: var(--text2); }
  .decision-flags-summary { margin-bottom: 18px; padding: 14px 16px; background: var(--surface); border: 1.5px solid var(--border2); border-radius: 12px; }
  .decision-flags-summary .dfs-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px; }
  .dfs-flag { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); }
  .dfs-flag:last-child { border-bottom: none; }
  .dfs-flag-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* HITL */
  .hitl-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  @media (max-width: 600px) { .hitl-options { grid-template-columns: 1fr; } }
  .hitl-opt {
    padding: 14px; border-radius: 12px; border: 2px solid var(--border); cursor: pointer;
    text-align: center; transition: all 0.15s;
  }
  .hitl-opt:hover { border-color: var(--border2); }
  .hitl-opt.selected { border-color: var(--accent); background: rgba(99,102,241,0.08); }
  .hitl-opt.selected.level_1 { border-color: var(--green); background: var(--green-bg); }
  .hitl-opt.selected.level_2 { border-color: var(--yellow); background: var(--yellow-bg); }
  .hitl-opt.selected.level_3 { border-color: var(--orange); background: var(--orange-bg); }
  .hitl-icon { font-size: 22px; margin-bottom: 6px; }
  .hitl-label { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .hitl-desc { font-size: 11px; color: var(--text2); line-height: 1.4; }
  .hitl-hint { font-size: 12px; color: var(--text3); margin-top: 8px; display: flex; align-items: center; gap: 6px; }

  /* MEASURES */
  .measures-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
  .measure-item {
    padding: 11px 13px; border-radius: 10px; border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s; display: flex; gap: 10px; align-items: flex-start;
  }
  .measure-item:hover { border-color: var(--border2); }
  .measure-item.selected { border-color: var(--accent2); background: rgba(99,102,241,0.08); }
  .measure-item.suggested { border-color: rgba(99,102,241,0.4); }
  .measure-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .measure-cat { font-size: 11px; color: var(--text3); }
  .suggested-dot { font-size: 9px; color: var(--accent2); margin-top: 3px; }

  /* BEST PRACTICES */
  .bp-list { display: flex; flex-direction: column; gap: 8px; }
  .bp-item { padding: 12px 14px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); font-size: 13px; line-height: 1.5; color: var(--text2); display: flex; gap: 10px; }
  .bp-item::before { content:'→'; color: var(--accent2); flex-shrink: 0; margin-top: 1px; }
  .bp-custom-note { margin-top: 10px; }
  .bp-custom-note textarea { width:100%; background:var(--surface2); border:1px solid var(--border2); border-radius:10px; padding:10px 13px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text); outline:none; resize:vertical; min-height:70px; line-height:1.5; }
  .bp-custom-note textarea:focus { border-color:var(--accent); }
  .bp-custom-note textarea::placeholder { color:var(--text3); }
  .bp-custom-note label { font-size:11px; color:var(--text3); margin-bottom:6px; display:block; }

  /* RESULT / AMPEL */
  .ampel-wrap { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .ampel-btn {
    flex: 1; min-width: 140px; padding: 14px; border-radius: 12px; border: 2px solid var(--border);
    cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .ampel-btn.green.selected { border-color: var(--green); background: var(--green-bg); }
  .ampel-btn.yellow.selected { border-color: var(--yellow); background: var(--yellow-bg); }
  .ampel-btn.red.selected { border-color: var(--red); background: var(--red-bg); }
  .ampel-btn.deferred.selected { border-color: var(--text3); background: rgba(92,100,144,0.12); }
  .ampel-btn:hover { border-color: var(--border2); }
  .ampel-icon { font-size: 22px; }
  .ampel-label { font-size: 13px; font-weight: 600; }
  .ampel-btn.green .ampel-label { color: var(--green); }
  .ampel-btn.yellow .ampel-label { color: var(--yellow); }
  .ampel-btn.red .ampel-label { color: var(--red); }
  .ampel-btn.deferred .ampel-label { color: var(--text2); }
  .ai-result-box { padding: 14px 16px; border-radius: 10px; font-size: 13px; line-height: 1.5; border: 1px solid; margin-top: 12px; }
  .ai-result-box.green { background: var(--green-bg); border-color: rgba(34,197,94,0.3); color: #86efac; }
  .ai-result-box.yellow { background: var(--yellow-bg); border-color: rgba(234,179,8,0.3); color: #fde68a; }
  .ai-result-box.red { background: var(--red-bg); border-color: rgba(239,68,68,0.3); color: #fca5a5; }
  .override-note { margin-top: 10px; }
  .override-note textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 13px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); outline: none; resize: vertical; min-height: 80px; }
  .override-note textarea:focus { border-color: var(--accent); }

  /* REJECTION CONSEQUENCE */
  .consequence-box { padding: 14px 16px; border-radius: 10px; background: var(--red-bg); border: 1px solid rgba(239,68,68,0.3); font-size: 13px; line-height: 1.6; }
  .consequence-box h4 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--red); margin-bottom: 8px; }
  .consequence-item { color: var(--text2); margin-bottom: 4px; }

  /* NOTES */
  .notes-area { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; resize: vertical; min-height: 80px; }
  .notes-area:focus { border-color: var(--accent); }

  /* BOTTOM BAR */
  .bottom-bar {
    position: sticky; bottom: 0;
    background: var(--bg); border-top: 1px solid var(--border);
    padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .bottom-info { font-size: 13px; color: var(--text3); }
  .bottom-actions { display: flex; gap: 10px; }
  .btn-next { padding: 10px 28px; border-radius: 10px; font-size: 14px; font-weight: 600; background: var(--accent); color: #fff; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
  .btn-next:hover { background: var(--accent3); }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

  /* COMPLETION SCREEN */
  .completion-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 57px); padding: 40px; text-align: center; }
  .completion-screen.active { display: flex; }
  .completion-icon { font-size: 64px; margin-bottom: 24px; }
  .completion-title { font-size: 32px; font-weight: 700; margin-bottom: 12px; }
  .completion-sub { font-size: 16px; color: var(--text2); margin-bottom: 32px; max-width: 480px; line-height: 1.6; }
  .completion-stats { display: flex; gap: 24px; justify-content: center; margin-bottom: 36px; flex-wrap: wrap; }
  .completion-stat { text-align: center; }
  .completion-stat-num { font-size: 32px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .completion-stat-num.green { color: var(--green); }
  .completion-stat-num.yellow { color: var(--yellow); }
  .completion-stat-num.red { color: var(--red); }
  .completion-stat-label { font-size: 13px; color: var(--text3); margin-top: 4px; }
  .btn-large { padding: 14px 40px; border-radius: 12px; font-size: 16px; font-weight: 600; background: var(--accent); color: #fff; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-large:hover { background: var(--accent3); }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp 0.3s ease forwards; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">TRUST-AI</div>
    <div class="sep">/</div>
    <span class="uc-badge" id="ucBadge">Use Case 1 von 8</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 von 8 bewertet</div>
  </div>
  <div>
    <button class="btn-sm btn-ghost" onclick="window.location.href='trust-ai-screen4.html'">← Zurück</button>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div id="mainLayout" style="display:grid; grid-template-columns: 320px 1fr;">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">Use Cases</div>
    <div class="uc-list" id="ucList"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div style="padding: 32px 32px 100px; max-width: 800px;" id="mainContent">
    <!-- UC HEADER -->
    <div class="uc-header fade-up" id="ucHeader">
      <div class="uc-meta" id="ucMeta"></div>
      <div class="uc-title" id="ucTitle"></div>
      <div style="margin-top:10px;" class="uc-desc" id="ucDesc"></div>
    </div>

    <!-- SECTIONS -->
    <div id="questionsSection"></div>
    <div id="flagsSection"></div>
    <div id="hitlSection"></div>
    <div id="measuresSection"></div>
    <div id="bpSection"></div>
    <div id="resultSection"></div>
    <div id="notesSection"></div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottomBar">
  <div class="bottom-info" id="bottomInfo"></div>
  <div class="bottom-actions">
    <button class="btn-sm btn-ghost" id="btnDefer" onclick="deferCurrentUC()">Zurückstellen</button>
    <button class="btn-next" id="btnNext" onclick="nextUC()" disabled>Weiter →</button>
  </div>
</div>

<!-- COMPLETION SCREEN -->
<div class="completion-screen" id="completionScreen">
  <div class="completion-icon">🎯</div>
  <div class="completion-title">Alle Use Cases bewertet</div>
  <div class="completion-sub">Alle Use Cases in deiner Shortlist wurden bewertet. Du kannst jetzt das KI-Manifest erstellen.</div>
  <div class="completion-stats" id="completionStats"></div>
  <button class="btn-large" onclick="goToManifest()">Manifest erstellen →</button>
</div>

<script>
// ────────────────────────────────────────────────
// DATA
// ────────────────────────────────────────────────

const ALL_UCS = {
  "UC-01": { title:"Erstellung von Projektstatusberichten", category:"Kommunikation & Reporting", desc:"Die KI aggregiert Daten aus PM-Systemen und erstellt strukturierte Statusberichte vollautomatisch.", hitl_default:"level_1", ethical:false, regulated:false, consequence:{ effort:"Hoch – 2–4 Stunden pro Woche", quality:"Inkonsistente Formatierung je nach Verfasser" } },
  "UC-02": { title:"Zusammenfassung von Meetings", category:"Dokumentation & Wissen", desc:"KI transkribiert und fasst Meetinginhalte, Entscheidungen und Action Items automatisch zusammen.", hitl_default:"level_1", ethical:true, ethicalNote:"Aufzeichnung von Personen – Einwilligung und Transparenz erforderlich.", regulated:false, consequence:{ effort:"Mittel – 30–60 Min. pro Meeting", quality:"Qualität hängt stark vom Protokollführer ab" } },

  flag_no_tool: { severity:"red", msg:"Kein Tool für diesen Use Case vorhanden.", action:"Use Case als 'aktuell nicht umsetzbar' markieren." },
  flag_approval_unclear: { severity:"yellow", msg:"Freigabe ist unklar – Use Case darf erst eingesetzt werden, wenn Klarheit besteht.", action:"Klärung mit IT/Compliance/Management herbeiführen." },
  flag_not_approved: { severity:"red", msg:"Dieser Use Case ist im Unternehmen nicht freigegeben.", action:"Use Case kann in diesem Projekt nicht umgesetzt werden." },
  flag_personal_data: { severity:"yellow", msg:"Personenbezogene Daten sind betroffen – Datenschutz prüfen.", action:"AVV prüfen, Datenklassifizierung vornehmen." },
  flag_customer_data: { severity:"yellow", msg:"Kundendaten sind betroffen – vertragliche und datenschutzrechtliche Zulässigkeit prüfen.", action:"Kundenvertrag und Datenschutz prüfen." },
  flag_confidential_data: { severity:"yellow", msg:"Vertrauliche Daten sollen in KI-Tools fließen – ist das erlaubt?", action:"Unternehmensrichtlinie prüfen." },
  flag_avv_unclear: { severity:"yellow", msg:"Keine Klarheit über AVV mit Tool-Anbieter.", action:"IT/Datenschutz klären lassen, bevor personenbezogene Daten verwendet werden." },
  flag_no_avv: { severity:"red", msg:"Keine AVV vorhanden – personenbezogene Daten dürfen nicht verarbeitet werden.", action:"Use Case erst umsetzbar, wenn AVV vorliegt." },
  flag_ethics_persons: { severity:"yellow", msg:"KI beeinflusst Entscheidungen über Personen – besondere Sorgfalt erforderlich.", action:"Transparenz sicherstellen, Betroffene informieren, Widerspruchsmöglichkeit prüfen." },
  flag_ethics_persons_indirect: { severity:"yellow", msg:"Personen sind indirekt von KI-Ergebnissen betroffen.", action:"Kommunikation und Transparenz gegenüber Betroffenen sicherstellen." },
  flag_transparency: { severity:"red", msg:"Bewusste Intransparenz über KI-Nutzung ist ethisch problematisch.", action:"Kommunikationsplan entwickeln oder Nutzung überdenken." },
  flag_gdpr: { severity:"yellow", msg:"DSGVO-Anforderungen sind relevant.", action:"Datenschutzbeauftragten einbinden, Verarbeitungsverzeichnis prüfen." },
  flag_regulated_pharma: { severity:"yellow", msg:"GxP-reguliertes Umfeld: KI-Nutzung muss validiert und dokumentiert werden.", action:"Validierungsanforderungen und SOPs prüfen." },
  flag_regulated_finance: { severity:"yellow", msg:"Finanzregulierung relevant: MiFID/BaFin-Anforderungen prüfen.", action:"Compliance-Abteilung einbinden." },
  flag_regulated_energy: { severity:"yellow", msg:"Kritische Infrastruktur: Erhöhte Sicherheitsanforderungen.", action:"Sicherheitsbeauftragten einbinden." },
  flag_regulated_defense: { severity:"red", msg:"Verteidigung / Dual Use: Erhöhte ethische und rechtliche Anforderungen.", action:"Rechtliche und ethische Prüfung durch Compliance und Legal vor Einsatz." },
  flag_regulated_medical: { severity:"yellow", msg:"Medizinprodukte-Regulierung: MDR/FDA-Anforderungen beachten.", action:"Regulatory Affairs einbinden." },
  flag_regulated_automotive: { severity:"yellow", msg:"Funktionale Sicherheit: ISO 26262 Anforderungen prüfen.", action:"Safety Engineer einbinden." }
};

// ────────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────────

let shortlist = [];
let currentIdx = 0;
let assessments = {}; // ucId -> assessment object

function loadData() {
  try {
    const proj = JSON.parse(localStorage.getItem('trust_ai_project') || '{}');
    const sl = proj.shortlist || [];
    if (sl.length === 0) {
      // demo data
      shortlist = [
        { use_case_id:"UC-02", priority:1, status:"pending", sofort:false },
        { use_case_id:"UC-01", priority:2, status:"pending", sofort:false },
        { use_case_id:"UC-15", priority:3, status:"pending", sofort:false },
        { use_case_id:"UC-10", priority:4, status:"pending", sofort:true },
        { use_case_id:"UC-04", priority:5, status:"pending", sofort:false },
      ];
    } else {
      shortlist = sl;
    }
    // Load existing assessments
    assessments = proj.assessments_map || {};
  } catch(e) {
    shortlist = [
      { use_case_id:"UC-02", priority:1, status:"pending", sofort:false },
      { use_case_id:"UC-01", priority:2, status:"pending", sofort:false },
      { use_case_id:"UC-15", priority:3, status:"pending", sofort:false },
    ];
    assessments = {};
  }
  // Sort: sofort first, then by priority
  shortlist.sort((a,b) => {
    if (a.sofort && !b.sofort) return -1;
    if (!a.sofort && b.sofort) return 1;
    return (a.priority||0) - (b.priority||0);
  });
}

// Per-UC assessment state
let currentAnswers = {};
let currentFlags = [];
let currentHITL = null;
let currentMeasures = new Set();
let currentAmpel = null;
let currentAmpelOverride = false;
let currentNotes = '';

function resetCurrentState() {
  const ucId = shortlist[currentIdx].use_case_id;
  const uc = ALL_UCS[ucId];
  currentAnswers = {};
  currentFlags = [];
  currentHITL = uc ? uc.hitl_default : 'level_1';
  currentMeasures = new Set(UC_SUGGESTED_MEASURES[ucId] || []);
  currentAmpel = null;
  currentAmpelOverride = false;
  currentNotes = '';
  // If we have a saved assessment, restore it
  if (assessments[ucId]) {
    const a = assessments[ucId];
    currentAnswers = a.answers || {};
    currentFlags = a.flags || [];
    currentHITL = a.hitl_level || currentHITL;
    currentMeasures = new Set(a.selected_measures || []);
    currentAmpel = a.result || null;
    currentNotes = a.notes || '';
  }
}

// ────────────────────────────────────────────────
// RENDER
// ────────────────────────────────────────────────

function render() {
  renderSidebar();
  renderProgress();
  renderCurrentUC();
}

function renderSidebar() {
  const list = document.getElementById('ucList');
  list.innerHTML = shortlist.map((item, i) => {
    const uc = ALL_UCS[item.use_case_id];
    const a = assessments[item.use_case_id];
    const resultClass = a ? `done-${a.result}` : '';
    const sofortClass = item.sofort ? 'sofort-item' : '';
    return `<div class="uc-list-item ${resultClass} ${sofortClass} ${i===currentIdx?'active':''}" onclick="jumpToUC(${i})">
      <div class="uc-list-dot"></div>
      <div class="uc-list-name">${uc ? uc.title : item.use_case_id}</div>
      <div class="uc-list-num">${i+1}</div>
    </div>`;
  }).join('');
}

function renderProgress() {
  const done = Object.keys(assessments).length;
  const total = shortlist.length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} von ${total} bewertet`;
  document.getElementById('ucBadge').textContent = `Use Case ${currentIdx+1} von ${total}`;
}

function renderCurrentUC() {
  const item = shortlist[currentIdx];
  const ucId = item.use_case_id;
  const uc = ALL_UCS[ucId];
  if (!uc) return;

  // Header
  const metaEl = document.getElementById('ucMeta');
  metaEl.innerHTML = `<span class="tag tag-cat">${uc.category}</span>` +
    (item.sofort ? `<span class="tag tag-sofort">⚡ Sofort</span>` : '') +
    (uc.ethical ? `<span class="tag tag-eth">⚠ Ethik</span>` : '') +
    (uc.regulated ? `<span class="tag tag-reg">§ Reguliert</span>` : '');
  document.getElementById('ucTitle').textContent = uc.title;
  document.getElementById('ucDesc').textContent = uc.desc;

  // Questions
  renderQuestions(ucId);
  // Flags (computed from answers)
  renderFlags();
  // HITL
  renderHITL(uc);
  // Measures
  renderMeasures(ucId);
  // Best Practices
  renderBP(ucId);
  // Result
  renderResult(uc, ucId);
  // Notes
  renderNotes();
  // Update next button
  updateNextBtn();
}

function renderQuestions(ucId) {
  const sec = document.getElementById('questionsSection');
  let html = `<div class="section">
    <div class="section-title">Bewertungsfragen</div>`;
  QUESTIONS.forEach(q => {
    html += `<div class="q-card">
      <div class="q-text">${q.text}</div>
      ${q.hint ? `<div class="q-hint">${q.hint}</div>` : ''}`;
    if (q.type === 'single') {
      html += `<div class="q-options">` + q.options.map(o => {
        const sel = currentAnswers[q.id] === o.value;
        return `<div class="q-opt${sel?' selected':''}" onclick="selectSingle('${q.id}','${o.value}',${o.flag?`'${o.flag}'`:'null'})">
          <div class="radio-circle${sel?' checked':''}"></div>${o.label}
        </div>`;
      }).join('') + `</div>`;
    } else if (q.type === 'multi') {
      const arr = currentAnswers[q.id] || [];
      html += `<div class="q-options">` + q.options.map(o => {
        const sel = arr.includes(o.value);
        return `<div class="q-opt q-opt-multi${sel?' selected':''}" onclick="toggleMulti('${q.id}','${o.value}',${o.flag?`'${o.flag}'`:'null'})">
          <div class="check-box${sel?' checked':''}"></div>${o.label}
        </div>`;
      }).join('') + `</div>`;
    } else if (q.type === 'text') {
      const val = currentAnswers[q.id] || '';
      html += `<input type="text" class="q-input" placeholder="${q.placeholder||''}" value="${val}" 
        oninput="updateText('${q.id}',this.value)">`;
    }
    html += `</div>`;
  });
  html += `</div>`;
  sec.innerHTML = html;
}

function renderFlags() {
  const sec = document.getElementById('flagsSection');
  if (currentFlags.length === 0) { sec.innerHTML = ''; return; }
  let html = `<div class="section"><div class="section-title">⚑ Hinweise & Flags</div><div class="flag-list">`;
  currentFlags.forEach(fid => {
    const f = FLAGS[fid];
    if (!f) return;
    const icon = f.severity === 'red' ? '🔴' : '🟡';
    html += `<div class="flag-item ${f.severity}">
      <div class="flag-icon">${icon}</div>
      <div>
        <div class="flag-msg">${f.msg}</div>
        <div class="flag-action">→ ${f.action}</div>
      </div>
    </div>`;
  });
  html += `</div></div>`;
  sec.innerHTML = html;
}

function renderHITL(uc) {
  const sec = document.getElementById('hitlSection');
  const levels = [
    { id:'level_1', icon:'🛡️', label:'Volle Kontrolle', desc:'Mensch prüft jedes Ergebnis und entscheidet.' },
    { id:'level_2', icon:'👁️', label:'Überwachte Autonomie', desc:'Mensch überwacht, prüft stichprobenartig.' },
    { id:'level_3', icon:'🤖', label:'Kontrollierte Automatisierung', desc:'KI handelt eigenständig in Grenzen.' }
  ];
  sec.innerHTML = `<div class="section">
    <div class="section-title">Human-in-the-Loop (HITL)</div>
    ${uc ? `<div class="hitl-hint" style="margin-bottom:12px;">💡 Empfehlung für diesen Use Case: <strong>${levels.find(l=>l.id===uc.hitl_default)?.label || uc.hitl_default}</strong></div>` : ''}
    <div class="hitl-options">
      ${levels.map(l => `<div class="hitl-opt ${currentHITL===l.id?'selected '+l.id:''}" onclick="selectHITL('${l.id}')">
        <div class="hitl-icon">${l.icon}</div>
        <div class="hitl-label">${l.label}</div>
        <div class="hitl-desc">${l.desc}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderMeasures(ucId) {
  const suggested = new Set(UC_SUGGESTED_MEASURES[ucId] || []);
  const sec = document.getElementById('measuresSection');
  const catLabels = { hitl:'Human-in-the-Loop', org:'Organisatorisch', tech:'Technisch', legal:'Rechtlich' };
  const cats = ['hitl','org','tech','legal'];
  let html = `<div class="section"><div class="section-title">Maßnahmen</div>`;
  cats.forEach(cat => {
    const ms = MEASURES.filter(m => m.cat === cat);
    if (!ms.length) return;
    html += `<div style="margin-bottom:14px;">
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600;">${catLabels[cat]}</div>
      <div class="measures-grid">`;
    ms.forEach(m => {
      const isSel = currentMeasures.has(m.id);
      const isSug = suggested.has(m.id);
      html += `<div class="measure-item${isSel?' selected':''}${isSug?' suggested':''}" onclick="toggleMeasure('${m.id}')">
        <div class="check-box${isSel?' checked':''}"></div>
        <div>
          <div class="measure-name">${m.label}</div>
          <div class="measure-cat">${isSug ? '⭐ Empfohlen' : ''}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  sec.innerHTML = html;
}

function renderBP(ucId) {
  const bps = UC_BEST_PRACTICES[ucId] || [];
  const sec = document.getElementById('bpSection');
  if (!bps.length) { sec.innerHTML = ''; return; }
  sec.innerHTML = `<div class="section"><div class="section-title">Best Practices für diesen Use Case</div>
    <div class="bp-list">
      ${bps.map(bp => `<div class="bp-item">${bp}</div>`).join('')}
    </div>
  </div>`;
}

function renderResult(uc, ucId) {
  const sec = document.getElementById('resultSection');
  // Auto-compute suggested result
  const suggested = computeSuggestedResult();
  const redFlags = currentFlags.filter(f => FLAGS[f]?.severity === 'red');
  const yellowFlags = currentFlags.filter(f => FLAGS[f]?.severity === 'yellow');

  let aiText = '';
  if (suggested === 'red') {
    aiText = `🔴 Rote Flags vorhanden (${redFlags.length}). Dieser Use Case sollte erst nach Klärung aller offenen Punkte umgesetzt werden oder abgelehnt werden.`;
  } else if (suggested === 'yellow') {
    aiText = `🟡 Gelbe Hinweise vorhanden (${yellowFlags.length}). Einsatz möglich, aber mit Auflagen. Offene Punkte müssen vor dem Einsatz geklärt werden.`;
  } else if (suggested === 'green') {
    aiText = `🟢 Keine kritischen Flags. Der Use Case kann unter den gewählten Bedingungen umgesetzt werden.`;
  }

  sec.innerHTML = `<div class="section">
    <div class="section-title">Bewertungsergebnis</div>
    ${aiText ? `<div class="ai-result-box ${suggested}" style="margin-bottom:16px;">${aiText}</div>` : ''}
    <div class="ampel-wrap">
      ${['green','yellow','red','deferred'].map(c => {
        const icons = { green:'🟢', yellow:'🟡', red:'🔴', deferred:'⏸️' };
        const labels = { green:'Freigegeben', yellow:'Bedingt freigegeben', red:'Abgelehnt', deferred:'Zurückgestellt' };
        return `<div class="ampel-btn ${c}${currentAmpel===c?' selected':''}" onclick="selectAmpel('${c}')">
          <div class="ampel-icon">${icons[c]}</div>
          <div class="ampel-label">${labels[c]}</div>
        </div>`;
      }).join('')}
    </div>
    ${currentAmpel && currentAmpel !== suggested ? `<div class="override-note" style="margin-top:14px;">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px;">Du weichst von der Empfehlung ab. Bitte begründe kurz:</div>
      <textarea placeholder="Begründung für abweichende Bewertung..." onchange="currentNotes = this.value + '\\n' + currentNotes">${''}</textarea>
    </div>` : ''}
    ${currentAmpel === 'red' && uc.consequence ? `<div class="consequence-box" style="margin-top:16px;">
      <h4>⚠ Konsequenz bei Ablehnung</h4>
      <div class="consequence-item">Aufwand-Impact: ${uc.consequence.effort}</div>
      <div class="consequence-item">Qualitäts-Impact: ${uc.consequence.quality}</div>
    </div>` : ''}
  </div>`;
}

function renderNotes() {
  document.getElementById('notesSection').innerHTML = `<div class="section">
    <div class="section-title">Notizen</div>
    <textarea class="notes-area" placeholder="Optionale Notizen zu diesem Use Case..." oninput="currentNotes=this.value">${currentNotes}</textarea>
  </div>`;
}

// ────────────────────────────────────────────────
// INTERACTIONS
// ────────────────────────────────────────────────

function computeFlags() {
  const newFlags = new Set();
  QUESTIONS.forEach(q => {
    if (q.type === 'single') {
      const val = currentAnswers[q.id];
      const opt = q.options.find(o => o.value === val);
      if (opt?.flag) newFlags.add(opt.flag);
    } else if (q.type === 'multi') {
      const arr = currentAnswers[q.id] || [];
      arr.forEach(v => {
        const opt = q.options.find(o => o.value === v);
        if (opt?.flag) newFlags.add(opt.flag);
      });
    }
  });
  currentFlags = [...newFlags];
}

function computeSuggestedResult() {
  const redFlags = currentFlags.filter(f => FLAGS[f]?.severity === 'red');
  const yellowFlags = currentFlags.filter(f => FLAGS[f]?.severity === 'yellow');
  if (redFlags.length > 0) return 'red';
  if (yellowFlags.length > 0) return 'yellow';
  // All answered and no flags?
  const answeredCount = Object.keys(currentAnswers).length;
  if (answeredCount >= 5) return 'green';
  return null;
}

function selectSingle(qid, val, flagId) {
  currentAnswers[qid] = val;
  computeFlags();
  rerenderAfterAnswer();
}

function toggleMulti(qid, val, flagId) {
  if (!currentAnswers[qid]) currentAnswers[qid] = [];
  const arr = currentAnswers[qid];
  const idx = arr.indexOf(val);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(val);
  computeFlags();
  rerenderAfterAnswer();
}

function updateText(qid, val) {
  currentAnswers[qid] = val;
  updateNextBtn();
}

function selectHITL(level) {
  currentHITL = level;
  renderHITL(ALL_UCS[shortlist[currentIdx].use_case_id]);
  updateNextBtn();
}

function toggleMeasure(id) {
  if (currentMeasures.has(id)) currentMeasures.delete(id);
  else currentMeasures.add(id);
  renderMeasures(shortlist[currentIdx].use_case_id);
}

function selectAmpel(val) {
  currentAmpel = val;
  const ucId = shortlist[currentIdx].use_case_id;
  renderResult(ALL_UCS[ucId], ucId);
  updateNextBtn();
}

function rerenderAfterAnswer() {
  const ucId = shortlist[currentIdx].use_case_id;
  renderQuestions(ucId);
  renderFlags();
  renderResult(ALL_UCS[ucId], ucId);
  updateNextBtn();
}

function updateNextBtn() {
  const btn = document.getElementById('btnNext');
  // Require at minimum: some answers + ampel set
  const hasAnswers = Object.keys(currentAnswers).length >= 3;
  const hasAmpel = currentAmpel !== null;
  btn.disabled = !(hasAnswers && hasAmpel);

  const total = shortlist.length;
  const isLast = currentIdx >= total - 1;
  btn.textContent = isLast ? 'Abschließen ✓' : 'Weiter →';
}

function saveCurrentAssessment() {
  const ucId = shortlist[currentIdx].use_case_id;
  assessments[ucId] = {
    use_case_id: ucId,
    answers: { ...currentAnswers },
    flags: [...currentFlags],
    result: currentAmpel || computeSuggestedResult() || 'yellow',
    hitl_level: currentHITL,
    selected_measures: [...currentMeasures],
    notes: currentNotes,
    assessed_at: new Date().toISOString()
  };
  // Also update shortlist status
  const slItem = shortlist.find(s => s.use_case_id === ucId);
  if (slItem) slItem.status = assessments[ucId].result;

  // Persist
  try {
    const proj = JSON.parse(localStorage.getItem('trust_ai_project') || '{}');
    proj.assessments_map = assessments;
    proj.shortlist = shortlist;
    proj.status = 'assessment';
    localStorage.setItem('trust_ai_project', JSON.stringify(proj));
  } catch(e) {}
}

function nextUC() {
  saveCurrentAssessment();
  const total = shortlist.length;
  if (currentIdx >= total - 1) {
    showCompletion();
    return;
  }
  currentIdx++;
  resetCurrentState();
  render();
  window.scrollTo(0, 0);
}

function jumpToUC(idx) {
  if (idx === currentIdx) return;
  saveCurrentAssessment();
  currentIdx = idx;
  resetCurrentState();
  render();
  window.scrollTo(0, 0);
}

function deferCurrentUC() {
  const ucId = shortlist[currentIdx].use_case_id;
  assessments[ucId] = {
    use_case_id: ucId,
    answers: { ...currentAnswers },
    flags: [...currentFlags],
    result: 'deferred',
    hitl_level: currentHITL,
    selected_measures: [...currentMeasures],
    notes: 'Zurückgestellt – noch ausstehend',
    assessed_at: new Date().toISOString()
  };
  const slItem = shortlist.find(s => s.use_case_id === ucId);
  if (slItem) slItem.status = 'deferred';
  saveCurrentAssessment();
  const total = shortlist.length;
  if (currentIdx < total - 1) {
    currentIdx++;
    resetCurrentState();
    render();
    window.scrollTo(0, 0);
  } else {
    showCompletion();
  }
}

function showCompletion() {
  document.getElementById('mainLayout').style.display = 'none';
  document.getElementById('bottomBar').style.display = 'none';
  const cs = document.getElementById('completionScreen');
  cs.classList.add('active');

  const counts = { green:0, yellow:0, red:0, deferred:0 };
  Object.values(assessments).forEach(a => { if (counts[a.result] !== undefined) counts[a.result]++; });

  document.getElementById('completionStats').innerHTML = `
    <div class="completion-stat"><div class="completion-stat-num green">${counts.green}</div><div class="completion-stat-label">Freigegeben</div></div>
    <div class="completion-stat"><div class="completion-stat-num yellow">${counts.yellow}</div><div class="completion-stat-label">Mit Auflagen</div></div>
    <div class="completion-stat"><div class="completion-stat-num red">${counts.red}</div><div class="completion-stat-label">Abgelehnt</div></div>
    <div class="completion-stat"><div class="completion-stat-num" style="color:var(--text2)">${counts.deferred}</div><div class="completion-stat-label">Zurückgestellt</div></div>`;

  // Save final
  try {
    const proj = JSON.parse(localStorage.getItem('trust_ai_project') || '{}');
    proj.assessments_map = assessments;
    proj.shortlist = shortlist;
    proj.status = 'manifest';
    localStorage.setItem('trust_ai_project', JSON.stringify(proj));
  } catch(e) {}
}

function goToManifest() {
  window.location.href = 'trust-ai-screen6.html';
}

// ────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────

loadData();
resetCurrentState();
render();
</script>
<script>
// ── Theme Toggle ──
(function(){
  const t = localStorage.getItem('trust_ai_theme');
  if (t) applyTheme5(t);
  else if (!window.matchMedia('(prefers-color-scheme:dark)').matches) applyTheme5('light');
})();
function applyTheme5(t) {
  if (t === 'light') {
    document.documentElement.style.setProperty('--bg','#F6F7FA');
    document.documentElement.style.setProperty('--surface','#FFFFFF');
    document.documentElement.style.setProperty('--surface2','#F0F2F8');
    document.documentElement.style.setProperty('--surface3','#E8EBF4');
    document.documentElement.style.setProperty('--border','#D8DCF0');
    document.documentElement.style.setProperty('--border2','#B8BEDA');
    document.documentElement.style.setProperty('--text','#111827');
    document.documentElement.style.setProperty('--text2','#374151');
    document.documentElement.style.setProperty('--text3','#6B7280');
  } else {
    document.documentElement.style.removeProperty('--bg');
    document.documentElement.style.removeProperty('--surface');
    document.documentElement.style.removeProperty('--surface2');
    document.documentElement.style.removeProperty('--surface3');
    document.documentElement.style.removeProperty('--border');
    document.documentElement.style.removeProperty('--border2');
    document.documentElement.style.removeProperty('--text');
    document.documentElement.style.removeProperty('--text2');
    document.documentElement.style.removeProperty('--text3');
  }
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = t === 'light' ? '🌙' : '☀️';
  localStorage.setItem('trust_ai_theme', t);
}
function toggleTheme() {
  const stored = localStorage.getItem('trust_ai_theme') || 'dark';
  applyTheme5(stored === 'dark' ? 'light' : 'dark');
}

// ── C4: AVV-Frage ausblenden wenn kein Tool ──
function checkAvvVisibility() {
  // Prüfe ob ein Tool ausgewählt wurde
  const project = JSON.parse(localStorage.getItem('trust_ai_project') || '{}');
  const hasTools = project.tool_inventory && project.tool_inventory.length > 0;
  const avvQuestions = document.querySelectorAll('[data-question-id*="avv"], [data-question-id*="AVV"]');
  avvQuestions.forEach(q => {
    q.closest('.q-card') && (q.closest('.q-card').style.display = hasTools ? '' : 'none');
  });
}

// ── C1: Flags auf Entscheidungsseite anzeigen ──
function renderDecisionFlags(flags) {
  const container = document.getElementById('decisionFlagsSummary');
  if (!container || !flags || !flags.length) return;
  const flagLabels = {
    'no_tool': { label: 'Kein Tool vorhanden', color: 'red', icon: '🔧' },
    'no_avv': { label: 'Kein AVV abgeschlossen', color: 'red', icon: '📋' },
    'ethical_flag': { label: 'Ethisches Risiko identifiziert', color: 'yellow', icon: '⚠️' },
    'regulated_industry': { label: 'Regulierte Branche – erhöhte Anforderungen', color: 'yellow', icon: '§' },
    'sensitive_data': { label: 'Sensible Daten involviert', color: 'red', icon: '🔒' },
    'data_not_ready': { label: 'Daten nicht KI-bereit – Aufwand erforderlich', color: 'yellow', icon: '📊' }
  };
  let html = '<div class="dfs-title">⚑ Gesammelte Hinweise für diese Bewertung</div>';
  flags.forEach(f => {
    const fl = flagLabels[f] || { label: f, color: 'blue', icon: 'ℹ️' };
    html += `<div class="dfs-flag"><div class="dfs-flag-dot" style="background:var(--${fl.color})"></div>${fl.icon} <span>${fl.label}</span></div>`;
  });
  container.innerHTML = html;
  container.style.display = 'block';
}

// ── C10: Datenmanagement-Frage Sichtbarkeit ──
document.addEventListener('DOMContentLoaded', () => {
  checkAvvVisibility();
  // UC-22 spezifisches Tool-Feld
  const ucId = window._currentUcId;
  if (ucId === 'UC-22') {
    const toolSection = document.getElementById('uc22-tool-field');
    if (toolSection) toolSection.style.display = 'block';
  }
});
</script>
